<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인사이트 클리핑 — 디자인 검수 v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
  <style>
    /* ============================================================
       디자인 시스템 v2 — SofT Brutalism
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #f4f4f7;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f0f0f5;
      --bg-elevated: #ffffff;

      --text-primary: #111111;
      --text-secondary: #2e2e2e;
      --text-muted: #7a7a85;

      --accent-primary: #4f46e5;
      --accent-primary-hover: #3b31c4;
      --accent-primary-subtle: rgba(79, 70, 229, 0.08);
      --accent-warning: #e85d2c;
      --accent-success: #0f9d6e;
      --accent-danger: #dc2626;

      /* Section colors — refined palette */
      --color-summary: #0d7a6a;
      --color-analysis: #6d28d9;
      --color-insights: #b45309;
      --color-implications: #047857;

      --border-color: #1a1a1a;
      --border-default: 2px solid var(--border-color);
      --border-subtle: 1px solid rgba(26, 26, 26, 0.12);
      --border-light: 1px solid rgba(26, 26, 26, 0.06);

      --shadow-sm: 2px 2px 0px var(--border-color);
      --shadow-md: 4px 4px 0px var(--border-color);
      --shadow-lg: 6px 6px 0px var(--border-color);
      --shadow-hover: 8px 8px 0px rgba(79, 70, 229, 0.5);

      --radius-none: 0px;
      --radius-sm: 4px;
      --radius-md: 8px;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --transition-fast: 0.2s var(--ease-out);
      --transition-normal: 0.35s var(--ease-out);
    }

    body {
      font-family: 'Noto Sans KR', 'Outfit', 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

    /* ============================================================
       HEADER — Refined navigation
       ============================================================ */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: var(--bg-secondary);
      border-bottom: var(--border-default);
    }
    .header-content {
      display: flex; align-items: center;
      height: 64px; padding: 0 20px;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      padding-right: 24px;
      border-right: var(--border-default);
      height: 64px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent-primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
      border: 2px solid var(--border-color);
    }
    .brand-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 800; font-size: 15px;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .brand-text span { color: var(--accent-primary); }

    /* Search */
    .search-group {
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px;
      border-left: var(--border-default);
      height: 64px; flex: 1; max-width: 340px;
    }
    .search-icon { font-size: 18px; color: var(--text-muted); }
    #search-input {
      border: none; background: transparent;
      font-size: 14px; font-weight: 500;
      font-family: inherit;
      width: 100%; outline: none;
      color: var(--text-primary);
    }
    #search-input::placeholder { color: var(--text-muted); }

    /* Nav Tabs */
    .nav-tabs {
      display: flex; height: 100%; align-items: center;
      margin-left: auto;
    }
    .nav-tab {
      cursor: pointer; height: 64px;
      padding: 0 18px;
      font-weight: 700; font-size: 13px;
      letter-spacing: 0.03em;
      color: var(--text-muted);
      transition: var(--transition-fast);
      display: flex; align-items: center; gap: 8px;
      border: none; background: transparent;
      border-left: var(--border-default);
      position: relative;
      white-space: nowrap;
    }
    .nav-tab:last-child { border-right: var(--border-default); }

    .nav-tab .tab-icon { font-size: 18px; transition: var(--transition-fast); }
    .nav-tab .badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--text-muted);
      color: white;
      font-size: 10px; font-weight: 800;
      padding: 1px 6px; min-width: 18px; height: 18px;
      transition: var(--transition-fast);
    }
    .nav-tab:hover {
      color: var(--text-primary);
      background: var(--accent-primary-subtle);
    }
    .nav-tab:hover .badge { background: var(--accent-primary); }

    .nav-tab.active {
      color: var(--accent-primary);
    }
    .nav-tab.active::after {
      content: '';
      position: absolute; bottom: 0; left: 8px; right: 8px;
      height: 3px;
      background: var(--accent-primary);
      border-radius: 2px 2px 0 0;
    }
    .nav-tab.active .badge { background: var(--accent-primary); display: none; }
    #unread-count, .badge.warning { background: var(--accent-warning) !important; }

    /* Stock Dashboard link */
    .btn-stock-dashboard {
      display: flex; align-items: center; justify-content: center;
      height: 64px; width: 64px;
      border-left: var(--border-default);
      color: var(--text-muted);
      font-size: 22px;
      transition: var(--transition-fast);
    }
    .btn-stock-dashboard:hover { color: var(--accent-primary); background: var(--accent-primary-subtle); }

    /* ============================================================
       LAYOUT — 3-column grid
       ============================================================ */
    .layout-container {
      display: grid;
      grid-template-columns: 220px 1fr 0px;
      width: 100%;
      height: calc(100vh - 64px);
      margin-top: 64px;
      position: relative;
      transition: grid-template-columns 0.4s var(--ease-out);
    }
    .layout-container.detail-active {
      grid-template-columns: 220px 1fr 620px;
    }

    /* ============================================================
       LEFT PANE — Visuals
       ============================================================ */
    .pane-visuals {
      border-right: var(--border-default);
      background: var(--bg-secondary);
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }

    /* Tag Ticker */
    .visual-top {
      height: 160px;
      border-bottom: var(--border-default);
      overflow: hidden;
      display: flex; flex-direction: column;
      justify-content: space-evenly;
      padding: 8px 0;
      background: var(--bg-secondary);
    }
    .tag-ticker-row {
      overflow: hidden; white-space: nowrap;
      width: 100%; height: 42px;
      display: flex; align-items: center;
      padding: 0 12px;
    }
    .tag-ticker-track {
      display: inline-flex; gap: 24px;
      animation: marqueeLeft 400s linear infinite;
    }
    .tag-ticker-row:nth-child(2) .tag-ticker-track {
      animation: marqueeRight 450s linear infinite;
    }
    .tag-ticker-row:nth-child(3) .tag-ticker-track {
      animation: marqueeLeft 500s linear infinite;
    }
    .tag-ticker-track span {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 12px;
      letter-spacing: 0.05em;
      color: var(--text-primary);
    }
    .tag-ticker-track span .tag-dot {
      width: 6px; height: 6px;
      background: var(--accent-primary);
      display: inline-block;
    }

    @keyframes marqueeLeft {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-50%, 0, 0); }
    }
    @keyframes marqueeRight {
      0% { transform: translate3d(-50%, 0, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    /* Counter */
    .visual-middle {
      height: 160px; position: relative;
      border-bottom: var(--border-default);
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .status-counter-box { text-align: center; }
    .counter-number {
      font-family: 'Outfit', monospace;
      font-size: 64px; font-weight: 900;
      line-height: 1; color: var(--text-primary);
      letter-spacing: -0.05em;
    }
    .counter-number .counter-plus {
      font-size: 32px;
      color: var(--accent-primary);
      vertical-align: super;
    }
    .counter-label {
      font-size: 9px; font-weight: 800;
      letter-spacing: 0.2em; color: var(--text-muted);
      margin-top: 8px;
    }

    /* Headlines */
    .visual-bottom {
      flex: 1; display: flex; flex-direction: column;
      padding: 14px; overflow: hidden;
      background: var(--bg-secondary);
    }
    .headlines-header {
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(26,26,26,0.1);
      padding-bottom: 8px; margin-bottom: 10px;
    }
    .headlines-list-wrapper { flex: 1; overflow: hidden; position: relative; }
    .headlines-scroll-track {
      display: flex; flex-direction: column; gap: 10px;
      position: absolute; width: 100%;
      animation: marqueeVert 60s linear infinite;
    }
    @keyframes marqueeVert {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    .headline-item {
      font-size: 11px; font-weight: 600;
      line-height: 1.35; color: var(--text-secondary);
      cursor: pointer; padding: 8px 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      box-shadow: var(--shadow-sm);
      transition: var(--transition-fast);
    }
    .headline-item:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent-primary);
      color: var(--text-primary);
    }

    /* ============================================================
       CENTER PANE — Feed
       ============================================================ */
    .pane-list {
      height: 100%; overflow-y: auto;
      background: var(--bg-primary);
      position: relative;
    }

    /* Card Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 28px;
      position: relative;
      z-index: 2;
    }
    .grid.list-mode {
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ---- Card ---- */
    .card {
      background: var(--bg-card);
      border: var(--border-default);
      display: flex; flex-direction: column;
      position: relative;
      cursor: pointer;
      transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out);
      outline: none;
      overflow: hidden;
    }
    .card:hover {
      transform: translate(-4px, -4px);
      box-shadow: var(--shadow-hover);
    }

    .card-thumbnail {
      aspect-ratio: 16/9;
      overflow: hidden;
      border-bottom: var(--border-default);
      background: var(--bg-primary);
      position: relative;
    }
    .card-thumbnail img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s var(--ease-out);
    }
    .card:hover .card-thumbnail img { transform: scale(1.03); }

    .card-content { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .card-channel {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-primary);
      display: flex; align-items: center; gap: 6px;
    }
    .card-channel .channel-dot {
      width: 4px; height: 4px;
      background: var(--accent-primary);
      display: inline-block;
    }
    .card-date {
      font-size: 10px; color: var(--text-muted);
      font-weight: 600; margin-left: auto;
    }

    .card-title {
      font-size: 14px; font-weight: 800;
      line-height: 1.4; color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: keep-all;
    }
    .card-desc {
      font-size: 12px; font-weight: 500;
      line-height: 1.5; color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: auto;
    }
    .card-tag {
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 9px; font-weight: 700;
      padding: 2px 7px;
      border: 1px solid rgba(26,26,26,0.15);
    }

    .card-actions {
      display: flex; border-top: var(--border-default); height: 44px;
    }
    .card-actions button {
      flex: 1; border: none; background: transparent;
      font-size: 11px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px;
      height: 100%; transition: var(--transition-fast);
      color: var(--text-muted);
    }
    .card-actions button:hover { color: white; }
    .card-actions .btn-read:hover { background: var(--accent-success); }
    .card-actions .btn-save:hover { background: var(--accent-primary); }
    .card-actions .btn-fav { width: 44px; border-left: var(--border-default); flex: none; }
    .card-actions .btn-fav:hover,
    .card-actions .btn-fav.active { color: var(--accent-warning); background: transparent; }

    /* Card category stripe */
    .card-stripe {
      width: 100%; height: 3px;
      flex-shrink: 0;
    }

    /* List mode */
    .grid.list-mode .card { flex-direction: row; min-height: 120px; }
    .grid.list-mode .card-thumbnail { width: 200px; height: auto; border-bottom: none; border-right: var(--border-default); }
    .grid.list-mode .card-content { padding: 12px 16px; }
    .grid.list-mode .card-actions { border-top: none; border-left: var(--border-default); flex-direction: column; width: 100px; }
    .grid.list-mode .card-actions .btn-fav { border-left: none; border-top: var(--border-default); width: 100%; }

    /* Category / Channel list */
    .vertical-list-mode {
      display: flex; flex-direction: column;
      border-top: var(--border-default);
      background: var(--bg-secondary);
    }
    .list-row-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 28px;
      border-bottom: var(--border-default);
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
    }
    .list-row-item:hover {
      background: var(--accent-primary-subtle);
      padding-left: 36px;
    }
    .list-row-left { display: flex; align-items: center; gap: 14px; }
    .list-row-icon { font-size: 22px; color: var(--accent-primary); }
    .list-row-title { font-size: 16px; font-weight: 800; }
    .list-row-right { display: flex; align-items: center; gap: 12px; }
    .list-row-count {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
    }

    /* ============================================================
       RIGHT PANE — Detail
       ============================================================ */
    .pane-detail {
      background: var(--bg-secondary);
      border-left: var(--border-default);
      height: 100%; overflow-y: auto;
      display: none; position: relative;
    }
    .layout-container.detail-active .pane-detail { display: block; }

    .detail-header-sticky {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-secondary);
      border-bottom: var(--border-default);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 20px 24px 16px;
    }
    .modal-meta-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; flex-wrap: wrap;
    }
    .modal-channel {
      font-weight: 800; color: var(--accent-primary);
      font-size: 12px; letter-spacing: 0.05em;
    }
    .modal-date {
      font-size: 11px; color: var(--text-muted);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .modal-title {
      font-size: 18px; font-weight: 800; line-height: 1.35;
    }
    .close-btn {
      width: 36px; height: 36px;
      border: var(--border-default);
      background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: var(--transition-fast);
      flex-shrink: 0;
    }
    .close-btn:hover { background: var(--text-primary); color: white; }

    .modal-body { padding: 20px 24px 80px; }

    /* Video section */
    .modal-video-section {
      border: var(--border-default);
      background: var(--bg-primary);
      margin-bottom: 20px;
      display: flex; flex-direction: column;
    }
    .modal-thumbnail {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
    }

    .modal-actions-video {
      display: flex; height: 46px;
    }
    .modal-actions-video .btn-youtube {
      flex: 2; height: 100%; border: none; background: var(--accent-danger);
      color: white; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer; transition: var(--transition-fast);
    }
    .modal-actions-video .btn-youtube:hover { background: #b91c1c; }
    .modal-actions-video .btn-read-detail {
      flex: 1.5; height: 100%; border: none; background: transparent;
      font-size: 11px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; border-right: var(--border-default);
      transition: var(--transition-fast); color: var(--text-muted);
    }
    .modal-actions-video .btn-read-detail:hover { background: var(--accent-success); color: white; }
    .modal-actions-video .btn-fav-detail {
      width: 46px; height: 100%; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: var(--transition-fast);
    }
    .modal-actions-video .btn-fav-detail:hover { color: var(--accent-warning); }

    /* Content sections */
    .content-section {
      border: var(--border-default);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--bg-primary);
      border-bottom: var(--border-default);
    }
    .section-icon {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .section-title {
      font-weight: 800; font-size: 13px;
      letter-spacing: 0.05em;
    }

    /* Section color themes */
    .content-section.summary .section-header { border-left: 4px solid var(--color-summary); }
    .content-section.analysis .section-header { border-left: 4px solid var(--color-analysis); }
    .content-section.insights .section-header { border-left: 4px solid var(--color-insights); }
    .content-section.implications .section-header { border-left: 4px solid var(--color-implications); }

    .section-content {
      padding: 16px 20px;
      font-size: 14px; line-height: 1.7;
      color: var(--text-secondary);
      word-break: keep-all;
    }

    /* Markdown content styling */
    .section-content h3 {
      font-size: 13px; font-weight: 800;
      padding: 8px 12px; margin: 16px 0 10px;
      border: 2px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      display: inline-flex; align-items: center; gap: 6px;
      color: #ffffff;
    }
    .section-content h3:first-child { margin-top: 0; }
    .section-content h3::before { content: "📌"; font-size: 12px; }

    .content-section.summary .section-content h3 { background: var(--color-summary); }
    .content-section.analysis .section-content h3 { background: var(--color-analysis); }
    .content-section.insights .section-content h3 { background: var(--color-insights); }
    .content-section.implications .section-content h3 { background: var(--color-implications); }

    .section-content ul, .section-content ol {
      list-style: none; padding: 0; margin: 8px 0;
    }
    .section-content li {
      padding: 8px 0 8px 14px;
      margin: 6px 0;
      line-height: 1.65;
      border-left: 3px solid;
      border-left-color: var(--accent-primary);
      font-size: 13px;
    }
    .section-content li strong { font-weight: 700; }
    .section-content li + li { margin-top: 1px; }
    .section-content b, .section-content strong { font-weight: 800; }

    .content-section.summary .section-content li { border-left-color: var(--color-summary); }
    .content-section.analysis .section-content li { border-left-color: var(--color-analysis); }
    .content-section.insights .section-content li { border-left-color: var(--color-insights); }
    .content-section.implications .section-content li { border-left-color: var(--color-implications); }

    /* Table inside content */
    .section-content .table-container {
      overflow-x: auto;
      border: var(--border-default);
      box-shadow: var(--shadow-sm);
      margin: 16px 0;
    }
    .section-content table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .section-content th, .section-content td {
      padding: 10px 14px;
      border-bottom: var(--border-default);
      text-align: left;
    }
    .section-content th {
      background: var(--bg-primary);
      font-weight: 800; font-size: 11px; letter-spacing: 0.05em;
    }
    .section-content tr:last-child td { border-bottom: none; }
    .section-content tr:nth-child(even) td { background: var(--bg-primary); }

    /* ============================================================
       FLOATING TOOLBAR
       ============================================================ */
    .floating-toolbar {
      position: fixed; bottom: 24px; right: 24px;
      z-index: 500;
    }
    .toolbar-content {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg-secondary);
      border: var(--border-default);
      padding: 6px 12px;
      box-shadow: var(--shadow-md);
    }
    .toolbar-divider { width: 2px; height: 22px; background: var(--border-color); }
    .toolbar-btn {
      width: 34px; height: 34px;
      border: var(--border-default);
      background: white; color: var(--text-primary);

          insights: '• REM 수면과 유사한 뇌파 패턴 — 학습 효율과 직접적 연관<br>• 주 4일제보다 딥워크 4시간 보장이 생산성 향상에 더 효과적',
          implications: '• 조직 문화 변화 필요: \"응답 시간\"보다 \"방해 금지 시간\"이 중요<br>• 오픈 오피스 → 딥워크 부스 도입 트렌드 가속화'
        }
      }
    ];

    const mixes = [
      { title: 'AI 반도체 산업 완전 분석 — NVDA, AMD, INTC 비교', date: '2026-06-21', sources: 5 },
      { title: '2026 하반기 거시경제 전망 — 금리, 환율, 원자재', date: '2026-06-19', sources: 4 },
      { title: '스타트업 생존 전략 시리즈: 시리즈 A에서 EXIT까지', date: '2026-06-17', sources: 6 },
      { title: 'AI 에이전트 미래 — 2030년까지의 로드맵', date: '2026-06-15', sources: 3 },
    ];

    const tags = [
      'AI', '금리', '반도체', 'FOMC', 'AGI', '엔비디아', '파월', '인플레이션',
      '검색엔진', 'G7', '규제', '딥워크', '생산성', '스타트업', '부동산',
      'ETF', '퀀트', '배당', '성장주', '가치주', '채권', '환율'
    ];

    const headlines = [
      '파월 의장, 9월 빅컷 시사… 2년물 금리 3%선 붕괴',
      'Claude 5, 멀티모달 추론 GPT-5 추월',
      '엔비디아 10:1 액면 분할 발표',
      'SearchGPT 전격 공개… 구글 독점 깨지나',
      'G7, AI 안전 협정 체결',
      '연준, 9월 빅컷 확률 78%로 급등',
      'TSMC 3nm 공정 생산량 2배 확대',
      '블랙웰 B200 품절 사태 지속',
      '딥워크의 힘 — 주 4일제보다 중요한 몰입',
      '한은도 4분기 금리 인하 시그널',
    ];

    // ============================================================
    // RENDER FUNCTIONS
    // ============================================================
    const colorMap = {
      economy: '#0d7a6a',
      ai: '#6d28d9',
      politics: '#b45309',
      business: '#047857',
      self: '#0f766e',
      society: '#d97706',
      lifestyle: '#0891b2'
    };

    function renderCards() {
      const grid = document.getElementById('card-grid');
      grid.innerHTML = cards.map(c => {
        const color = colorMap[c.category] || '#4f46e5';
        return `
          <div class="card" data-id="${c.id}" onclick="openDetail(${c.id})">
            <div class="card-stripe" style="background:${color}"></div>
            <div class="card-thumbnail">
              <img src="https://picsum.photos/seed/${c.id}320/320/180" alt="" loading="lazy"
                   onerror="this.style.display='none';this.parentElement.style.background='var(--bg-primary)'">
            </div>
            <div class="card-content">
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <span class="card-channel">
                  <span class="channel-dot"></span>${c.channel}
                </span>
                <span class="card-date">${c.date.slice(5)}</span>
              </div>
              <div class="card-title">${c.fav ? '⭐ ' : ''}${c.title}</div>
              <div class="card-desc">${c.desc}</div>
              <div class="card-tags">
                ${c.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-read" onclick="event.stopPropagation();this.innerHTML='<i class=\\'ph ph-check\\'></i>읽음';this.style.background='var(--accent-success)';this.style.color='white'">
                <i class="ph ph-check-circle"></i>읽음
              </button>
              <button class="btn-save" onclick="event.stopPropagation();">
                <i class="ph ph-list-plus"></i>보관
              </button>
              <button class="btn-fav ${c.fav ? 'active' : ''}" onclick="event.stopPropagation();this.classList.toggle('active')">
                <i class="ph ph-star"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderCategories() {
      const grid = document.getElementById('card-grid');
      grid.innerHTML = `
        <div class="vertical-list-mode" style="grid-column:1/-1;">
          ${categories.map(c => `
            <div class="list-row-item" onclick="alert('${c.label} 필터 활성화')">
              <div class="list-row-left">
                <span class="list-row-icon">${c.icon}</span>
                <span class="list-row-title">${c.label}</span>
              </div>
              <div class="list-row-right">
                <span class="list-row-count">${c.count}개</span>
                <i class="ph ph-caret-right" style="color:var(--text-muted)"></i>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function openDetail(id) {
      const c = cards.find(x => x.id === id);
      if (!c) return;
      document.getElementById('det-channel').textContent = c.channel;
      document.getElementById('det-date').textContent = c.date;
      document.getElementById('det-title').textContent = c.title;

      const d = c.detail;
      document.getElementById('detail-body').innerHTML = `
        <div class="modal-video-section">
          <img class="modal-thumbnail" src="https://picsum.photos/seed/d${id}640/360" alt=""
               onerror="this.style.display='none'">
          <div class="modal-actions-video">
            <a class="btn-youtube" href="#" target="_blank"><i class="ph-fill ph-play-circle"></i>YouTube</a>
            <button class="btn-read-detail"><i class="ph ph-check-circle"></i>읽음</button>
            <button class="btn-fav-detail"><i class="ph ph-star"></i></button>
          </div>
        </div>
        <div class="content-section summary">
          <div class="section-header"><span class="section-icon">📋</span><span class="section-title">요약 (Summary)</span></div>
          <div class="section-content">${d.summary}</div>
        </div>
        <div class="content-section analysis">
          <div class="section-header"><span class="section-icon">🔍</span><span class="section-title">분석 (Analysis)</span></div>
          <div class="section-content">${d.analysis}</div>
        </div>
        <div class="content-section insights">
          <div class="section-header"><span class="section-icon">💡</span><span class="section-title">인사이트 (Insights)</span></div>
          <div class="section-content">${d.insights}</div>
        </div>
        <div class="content-section implications">
          <div class="section-header"><span class="section-icon">🎯</span><span class="section-title">시사점 (Implications)</span></div>
          <div class="section-content">${d.implications}</div>
        </div>
      `;

      document.getElementById('layout-container').classList.add('detail-active');
    }

    // Close detail
    document.getElementById('close-detail').addEventListener('click', () => {
      document.getElementById('layout-container').classList.remove('detail-active');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('layout-container').classList.remove('detail-active');
    });

    // Ticker populate
    function populateTicker() {
      for (let r = 1; r <= 3; r++) {
        const el = document.getElementById(`ticker-${r}`);
        let content = '';
        for (let i = 0; i < 8; i++) {
          const shuffled = [...tags].sort(() => (i * 7 + r * 3) % tags.length - i);
          shuffled.slice(0, 14).forEach(t => {
            content += `<span><span class="tag-dot"></span>${t}</span>`;
          });
        }
        el.innerHTML = content;
      }
    }

    // Headlines populate
    function populateHeadlines() {
      const el = document.getElementById('headlines-list');
      el.innerHTML = [...headlines, ...headlines].map(h =>
        `<div class="headline-item">${h}</div>`
      ).join('');
    }

    // View toggle
    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('card-grid').classList.toggle('list-mode', btn.dataset.view === 'list');
      });
    });

    // Back to top
    document.getElementById('btn-top').addEventListener('click', () => {
      document.getElementById('pane-list').scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Refresh
    document.getElementById('btn-refresh').addEventListener('click', function() {
      const icon = this.querySelector('.tab-icon');
      icon.style.animation = 'spin 0.8s linear infinite';
      setTimeout(() => icon.style.animation = '', 1200);
    });

    // Tab switching
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        if (this.id === 'btn-refresh') return;
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('layout-container').classList.remove('detail-active');

        if (this.id === 'tab-category') { renderCategories(); return; }
        renderCards();
      });
    });

    // Init
    populateTicker();
    populateHeadlines();
    renderCards();
  </script>
</body>
</html>
