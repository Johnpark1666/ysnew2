<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ysnew2 — design v3</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f8fa;
      --bg-card: #ffffff;
      --text: #1a1a1a;
      --text-dim: #8a8a94;
      --accent: #4f46e5;
      --accent-light: rgba(79, 70, 229, 0.1);
      --border: #e2e2e8;
      --line: 1px solid var(--border);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navigation line ── */
    .nav {
      display: flex;
      align-items: center;
      height: 44px;
      border-bottom: var(--line);
      background: var(--bg-card);
      flex-shrink: 0;
      padding: 0 16px;
      gap: 0;
    }
    .nav a {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      transition: none;
      border-bottom: 2px solid transparent;
    }
    .nav a:hover { color: var(--text); }
    .nav a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .nav .nav-count {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      margin-left: 4px;
    }
    .nav .spacer { flex: 1; }
    .nav .search {
      border: none;
      background: transparent;
      font: inherit;
      font-size: 13px;
      padding: 0 12px;
      outline: none;
      color: var(--text);
      width: 200px;
    }
    .nav .search::placeholder { color: var(--text-dim); }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left sidebar ── */
    .sidebar {
      width: 200px;
      border-right: var(--line);
      background: var(--bg-card);
      flex-shrink: 0;
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { color: var(--text); }
    .sidebar-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--accent-light);
    }
    .sidebar-item .count {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Feed ── */
    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      align-content: start;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border-radius: 8px;
      border: var(--line);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 12px 14px 10px; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .card-channel {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
    }
    .card-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }
    .card-tag {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      padding: 2px 6px;
      background: var(--bg);
      border-radius: 4px;
    }

    .card-actions {
      display: flex;
      border-top: var(--line);
    }
    .card-actions button {
      flex: 1;
      height: 36px;
      border: none;
      background: transparent;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text-dim);
      transition: 0.1s;
    }
    .card-actions button:hover { color: var(--text); }
    .card-actions .fav {
      width: 40px;
      flex: none;
      border-left: var(--line);
    }
    .card-actions .fav.active { color: var(--accent); }

    /* ── Detail (right panel) ── */
    .detail {
      width: 0;
      overflow: hidden;
      background: var(--bg-card);
      border-left: var(--line);
      transition: width 0.25s;
      flex-shrink: 0;
    }
    .detail.open { width: 520px; }

    .detail-inner {
      width: 520px;
      height: 100%;
      overflow-y: auto;
    }

    .detail-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .detail-header {
      padding: 16px 20px;
      border-bottom: var(--line);
    }
    .detail-channel {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }
    .detail-date {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: 8px;
    }
    .detail-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      margin-top: 4px;
    }

    .detail-body { padding: 16px 20px 60px; }

    .section {
      margin-bottom: 20px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .section-content {
      font-size: 13px;
      line-height: 1.65;
      color: #333;
    }
    .section-content ul {
      list-style: none;
      padding: 0;
    }
    .section-content li {
      padding: 6px 0 6px 12px;
      border-left: 2px solid;
      margin-bottom: 4px;
    }
    .section-content li strong { font-weight: 700; color: var(--text); }
    .section-content h3 {
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      margin: 14px 0 8px;
      border-radius: 4px;
      color: #fff;
      display: inline-block;
    }
    .section-content h3:first-child { margin-top: 0; }
    .section-content .table-container {
      overflow-x: auto;
      border: var(--line);
      border-radius: 6px;
      margin: 12px 0;
    }
    .section-content table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .section-content th, .section-content td { padding: 8px 12px; text-align: left; border-bottom: var(--line); }
    .section-content th { background: var(--bg); font-weight: 600; font-size: 11px; }
    .section-content tr:last-child td { border-bottom: none; }

    .detail-close {
      position: sticky; top: 0; float: right;
      width: 32px; height: 32px;
      border: none; background: transparent;
      cursor: pointer; font-size: 18px;
      color: var(--text-dim);
      z-index: 10;
      margin: 8px;
    }
    .detail-close:hover { color: var(--text); }

    /* ── Transitions ── */
    .feed.list-mode {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .feed.list-mode .card {
      display: flex;
      height: 100px;
    }
    .feed.list-mode .card-img {
      width: 160px;
      height: 100%;
      aspect-ratio: auto;
    }
    .feed.list-mode .card-body { flex: 1; }
    .feed.list-mode .card-actions {
      flex-direction: column;
      width: 80px;
    }
    .feed.list-mode .card-actions .fav {
      width: 100%;
      border-left: none;
      border-top: var(--line);
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .detail.open { width: 100% !important; position: fixed; top: 0; left: 0; z-index: 100; height: 100%; }
      .nav { overflow-x: auto; gap: 0; }
      .nav .search { width: 140px; }
      .feed { grid-template-columns: 1fr; }
    }

    .hidden { display: none !important; }
  </style>
</head>

  <!-- Navigation -->

  <script>

      { id:2, category:'ai', channel:'AI 연구소', title:'Claude 5, 멀티모달 추론 GPT-5 추월… AGI 앞당기나', date:'06-20', tags:['Claude5','AGI','멀티모달','Anthropic'], fav:true,

        insights:'• 개인 투자자 순매수 1위 종목, 분할 후 추가 수급 기대<br>• TSMC CoWoS-L 패키징 공급 병목이 유일한 하방 리스크',

        summary:'• 딥워크 4시간이 일반 근무 8시간을 능가<br>• 몰입 진입 시간 평균 23분, 방해 후 회복 25분 추가',

    const headlines = [
      '파월 의장, 9월 빅컷 시사… 2년물 금리 3%선 붕괴',

      'SearchGPT 전격 공개… 구글 독점 깨지나',
      'G7, AI 안전 협정 체결',
      '연준, 9월 빅컷 확률 78%로 급등',
      'TSMC 3nm 공정 생산량 2배 확대',
      '블랙웰 B200 품절 사태 지속',
      '딥워크의 힘 — 주 4일제보다 중요한 몰입',
      '한은도 4분기 금리 인하 시그널',
    ];

    // ── Render ──
    const feed = document.getElementById('feed');
    const sidebar = document.getElementById('sidebar');
    const detail = document.getElementById('detail');
    const detailInner = document.getElementById('detail-inner');

    function renderSidebar() {
      sidebar.innerHTML = categories.map(c =>
        `<div class="sidebar-item" data-cat="${c.id}" onclick="filterCategory('${c.id}')">
          <span>${c.icon} ${c.label}</span>
          <span class="count">${c.count}</span>
        </div>`
      ).join('');
    }

    function renderCards(filterCat) {
      const data = filterCat ? cards.filter(c => c.category === filterCat) : cards;
      feed.innerHTML = data.map(c => `
        <div class="card" onclick="openDetail(${c.id})">
          <img class="card-img" src="https://picsum.photos/seed/c${c.id}/320/180" alt=""
               onerror="this.style.display='none'">
          <div class="card-body">
            <div class="card-meta">
              <span class="card-channel">${c.channel}</span>
              <span class="card-date">${c.date}</span>
            </div>
            <div class="card-title">${c.fav ? '⭐ ' : ''}${c.title}</div>
            <div class="card-tags">${c.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
          </div>
          <div class="card-actions">
            <button onclick="event.stopPropagation()">읽음</button>
            <button onclick="event.stopPropagation()">보관</button>
            <button class="fav${c.fav ? ' active' : ''}" onclick="event.stopPropagation();this.classList.toggle('active')">★</button>
          </div>
        </div>
      `).join('');
    }

    function openDetail(id) {
      const c = cards.find(x => x.id === id);
      if (!c) return;
      detailInner.innerHTML = `
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <img class="detail-img" src="https://picsum.photos/seed/d${id}/640/360" alt=""
             onerror="this.style.display='none'">
        <div class="detail-header">
          <span class="detail-channel">${c.channel}</span>
          <span class="detail-date">${c.date}</span>
          <div class="detail-title">${c.title}</div>
        </div>
        <div class="detail-body">
          <div class="section">
            <div class="section-label" style="color:${sectionColors.summary}">📋 요약</div>
            <div class="section-content">${c.summary}</div>
          </div>
          <div class="section">
            <div class="section-label" style="color:${sectionColors.analysis}">🔍 분석</div>
            <div class="section-content">${c.analysis}</div>
          </div>
          <div class="section">
            <div class="section-label" style="color:${sectionColors.insights}">💡 인사이트</div>
            <div class="section-content">${c.insights}</div>
          </div>
          <div class="section">
            <div class="section-label" style="color:${sectionColors.implications}">🎯 시사점</div>
            <div class="section-content">${c.implications}</div>
          </div>
        </div>
      `;
      detail.classList.add('open');
    }

    function closeDetail() {
      detail.classList.remove('open');
    }

    function filterCategory(cat) {
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
      renderCards(cat);
      closeDetail();
    }

    // ── Events ──
    document.querySelectorAll('.nav a[data-tab]').forEach(a => {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav a').forEach(el => el.classList.remove('active'));
        this.classList.add('active');
        closeDetail();
        renderCards();
      });
    });

    // Keyboard
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // Init
    renderSidebar();
    renderCards();
  </script>
</body>
</html>
