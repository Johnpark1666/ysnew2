<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <title>인사이트 클리핑</title>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="search-group">
        <i class="ph ph-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="검색..." autocomplete="off">
        <button id="btn-clear-search" class="hidden"><i class="ph ph-x-circle"></i></button>
      </div>

      <div class="nav-tabs">
        <a href="https://stock-dashboard1-brown.vercel.app/" target="_blank" class="btn-stock-dashboard" title="주식 대시보드로 이동">
          <img src="/stock-icon.png" alt="주식 대시보드" class="stock-dashboard-icon">
        </a>
        <button class="nav-tab active" id="tab-unread" title="읽지 않음">
          <img src="/icon/chat.png" alt="읽지 않음" class="tab-icon-img">
          <span class="badge" id="unread-count">0</span>
        </button>
        <button class="nav-tab" id="tab-favorite" title="즐겨찾기">
          <img src="/icon/wish-list.png" alt="즐겨찾기" class="tab-icon-img">
          <span class="badge" id="fav-count">0</span>
        </button>
        <button class="nav-tab" id="tab-category" title="카테고리">
          <img src="/icon/application.png" alt="카테고리" class="tab-icon-img">
          <span class="badge" id="category-count">0</span>
        </button>
        <button class="nav-tab" id="tab-channel" title="채널별">
          <img src="/icon/play.png" alt="채널별" class="tab-icon-img">
          <span class="badge" id="channel-count">0</span>
        </button>
        <button class="nav-tab" id="tab-today" title="오늘의 봄봄">
          <img src="/icon/email.png" alt="오늘의 봄봄" class="tab-icon-img">
        </button>
        <button class="nav-tab" id="tab-mix" title="믹스">
          <img src="/icon/connection.png" alt="믹스" class="tab-icon-img">
          <span class="badge" id="mix-count">0</span>
        </button>
        <button class="nav-tab" id="tab-github" title="GitHub">
          <img src="/icon/github.png" alt="GitHub" class="tab-icon-img">
          <span class="badge" id="github-count">0</span>
        </button>
        <button class="nav-tab" id="btn-refresh" title="새로고침">
          <i class="ph ph-arrows-clockwise"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Layout Grid -->
  <main id="layout-container" class="layout-container">
    
    <!-- LEFT PANEL: Dynamic Tag Ticker, Status Counter, & Video Headlines -->
    <div id="pane-visuals" class="pane-visuals">
      <!-- 1. Horizontal 3-Row Tag Ticker -->
      <div class="visual-top tag-ticker-container">
        <div class="tag-ticker-row row-1">
          <div class="tag-ticker-track" id="dynamic-tag-ticker-1">
            <span>LOADING TAGS...</span>
          </div>
        </div>
        <div class="tag-ticker-row row-2">
          <div class="tag-ticker-track" id="dynamic-tag-ticker-2">
            <span>LOADING TAGS...</span>
          </div>
        </div>
        <div class="tag-ticker-row row-3">
          <div class="tag-ticker-track" id="dynamic-tag-ticker-3">
            <span>LOADING TAGS...</span>
          </div>
        </div>
      </div>
      <!-- 2. Status Counter Section (Shrunk) -->
      <div class="visual-middle status-counter-section">
        <canvas id="bg-visual-canvas"></canvas>
        <div class="status-counter-box">
          <div id="visual-unread-count" class="counter-number">0</div>
          <div class="counter-label">UNREAD CLIPS</div>
        </div>
      </div>
      <!-- 3. Latest Video Headlines (Expanded) -->
      <div class="visual-bottom headlines-section">
        <div class="headlines-header">LATEST HEADLINES</div>
        <div class="headlines-list-wrapper">
          <div class="headlines-scroll-track" id="headlines-scroll-list">
            <!-- Latest video titles scroll here -->
          </div>
        </div>
      </div>
    </div>

    <!-- CENTER PANEL: Main Feed Panel -->
    <div id="pane-list" class="pane-list">
      <!-- HTML-in-Canvas Surface -->
      <canvas id="main-canvas"></canvas>

      <!-- Loader (Z-index managed above canvas if loading) -->
      <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">데이터를 불러오는 중입니다...</div>
      </div>

      <!-- Card Grid (Either child of main-canvas in supported mode or sibling fallback) -->
      <div id="card-grid" class="grid"></div>
    </div>

    <!-- RIGHT PANEL: Sublist Pane (For Channel/Category Videos) -->
    <div id="pane-sublist" class="pane-sublist">
      <div class="detail-header-sticky">
        <div class="modal-header">
          <div class="modal-header-content" style="flex: 1; min-width: 0;">
            <h2 id="sl-title" class="modal-title">목록</h2>
          </div>
          <div class="modal-actions-top">
            <button class="close-btn" id="close-sublist">
              <i class="ph ph-x"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="sublist-body" id="sublist-body"></div>
    </div>

    <!-- RIGHT PANEL: Detail Pane -->
    <div id="pane-detail" class="pane-detail">
      <div class="detail-header-sticky">
        <div class="modal-header">
          <div class="modal-header-content" style="flex: 1; min-width: 0;">
            <div class="modal-meta-header" style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap;">
              <span id="m-channel" style="font-weight: 800; color: var(--accent-primary); font-size: 13px; text-transform: uppercase;">채널명</span>
              <span style="color: var(--text-muted); font-size: 11px;">|</span>
              <div id="m-date" style="display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); font-weight: 700;">
                <i class="ph ph-calendar-blank"></i>
                <span id="m-date-text">-</span>
              </div>
            </div>
            <h2 id="m-title" class="modal-title">제목</h2>
          </div>
          <div class="modal-actions-top">
            <button class="close-btn" id="close-detail">
              <i class="ph ph-x"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="modal-body">
        <div class="modal-video-section">
          <img id="m-img" class="modal-thumbnail" src="" alt="Video thumbnail">
          <div class="modal-actions-video">
            <a id="m-link" href="#" target="_blank" class="btn-youtube">
              <i class="ph-fill ph-play-circle"></i>
              YouTube에서 보기
            </a>
            <button id="m-btn-read" class="btn-mark-read">
              <i class="ph ph-check-circle"></i>
              읽음
            </button>
            <button id="m-btn-wl" class="btn-watch-later">
              <i class="ph ph-list-plus"></i>
              보관함 추가
            </button>
            <button id="m-btn-fav" class="btn-favorite">
              <i class="ph ph-star"></i>
            </button>
          </div>
        </div>

        <div class="content-section">
          <div class="section-header">
            <div class="section-icon summary">
              <img src="/icon/summary.png" alt="Summary">
            </div>
            <span class="section-title">요약 (Summary)</span>
          </div>
          <div id="m-summary" class="section-content">내용 없음</div>
        </div>

        <div class="content-section">
          <div class="section-header">
            <div class="section-icon analysis">
              <img src="/icon/analysis.png" alt="Analysis">
            </div>
            <span class="section-title">분석 (Analysis)</span>
          </div>
          <div id="m-analysis" class="section-content">내용 없음</div>
        </div>

        <div class="content-section">
          <div class="section-header">
            <div class="section-icon insights">
              <img src="/icon/insights.png" alt="Insights">
            </div>
            <span class="section-title">인사이트 (Insights)</span>
          </div>
          <div id="m-insights" class="section-content">내용 없음</div>
        </div>

        <div class="content-section">
          <div class="section-header">
            <div class="section-icon implications">
              <img src="/icon/implications.png" alt="Implications">
            </div>
            <span class="section-title">시사점 (Implications)</span>
          </div>
          <div id="m-implications" class="section-content">내용 없음</div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Mix Detail Pane -->
    <div id="pane-mix-detail" class="pane-detail">
      <div class="detail-header-sticky">
        <div class="modal-header">
          <div class="modal-header-content" style="flex: 1; min-width: 0;">
            <h2 id="mix-title" class="modal-title">믹스 제목</h2>
            <div id="mix-date" class="modal-date" style="margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); font-weight: 700;">
              <i class="ph ph-calendar-blank"></i>
              <span id="mix-date-text">-</span>
            </div>
          </div>
          <div class="modal-actions-top">
            <button class="close-btn" id="close-mix-detail">
              <i class="ph ph-x"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-body" id="mix-body">
        <div class="mix-media-container" id="mix-media-container"></div>
        <div class="content-section">
          <div class="section-header">
            <div class="section-icon summary">
              <i class="ph ph-youtube-logo"></i>
            </div>
            <span class="section-title">원본 소스 영상</span>
          </div>
          <div id="mix-sources-container" class="grid list-mode mix-sources" style="padding: 16px;"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Today Pane -->
    <div id="pane-today" class="pane-today" style="display: none; width: 100%; height: 100%;">
      <iframe src="https://www.bombom.news/today" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
  </main>

  <!-- Floating Toolbar -->
  <div id="floating-toolbar" class="floating-toolbar hidden">
    <div class="toolbar-content">
      <div id="toolbar-view-toggle" class="view-toggle" style="display: flex; gap: 4px;">
        <button class="view-btn grid-btn active toolbar-btn" data-view="grid" title="그리드 보기">
          <i class="ph ph-squares-four"></i>
        </button>
        <button class="view-btn list-btn toolbar-btn" data-view="list" title="목록 보기">
          <i class="ph ph-list"></i>
        </button>
      </div>
      
      <div class="toolbar-divider"></div>
      
      <select id="toolbar-sort-select" class="sort-select">
        <option value="newest">최신순</option>
        <option value="oldest">오래된순</option>
      </select>
      
      <button id="btn-select-mode" class="toolbar-btn" title="다중 선택">
        <i class="ph ph-check-square-offset"></i>
      </button>

      <div class="toolbar-divider selection-only hidden"></div>

      <button id="btn-mark-selected-read" class="toolbar-btn active hidden" title="선택 항목 읽음 처리" style="background: var(--accent-success); color: white; width: auto; padding: 0 16px; gap: 8px;">
        <i class="ph ph-checks"></i>
        <span id="selected-count-text">0개 읽음</span>
      </button>

      <div class="toolbar-divider"></div>
      
      <button id="btn-back-to-top" class="toolbar-btn" title="맨 위로">
        <i class="ph ph-arrow-up"></i>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
